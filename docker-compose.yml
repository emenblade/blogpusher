services:
  blogpusher:
    image: ghcr.io/emenblade/blogpusher:latest
    container_name: blogpusher
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5000}:5000"   # set HOST_PORT env var or in .env to change
    volumes:
      - ./config.yaml:/app/config.yaml:ro

# To run a second instance for a different blog:
#   1. Copy this folder to a new directory
#   2. Change container_name to something unique (e.g. blogpusher-travel)
#   3. Change the left port (e.g. 5001:5000)
#   4. Drop in a new config.yaml pointing at the other repo
